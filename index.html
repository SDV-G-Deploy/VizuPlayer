<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VizuPlayer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #0f1220;
      color: #ecf0ff;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #1a2145, #0f1220 55%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .layout {
      width: min(100%, 1024px);
      display: grid;
      gap: 16px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(4px);
    }

    #visualizer-canvas {
      width: 100%;
      height: 320px;
      border-radius: 10px;
      background: #0a0e20;
      display: block;
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel">
      <h1>VizuPlayer Engine Sandbox</h1>
      <div id="player-root"></div>
    </section>

    <section class="panel">
      <canvas id="visualizer-canvas" width="960" height="320"></canvas>
    </section>
  </main>

  <script type="module" src="./src/core/app.js"></script>
</body>
</html>
