<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VizuPlayer MVP</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #111423;
      color: #eef3ff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
      background: radial-gradient(circle at top left, #1a2250, #111423 60%);
    }

    .panel {
      width: min(100%, 760px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.5rem;
    }

    p {
      margin-top: 0;
      opacity: 0.85;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 12px;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: inherit;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #player-status {
      margin: 0 0 8px;
      font-weight: 600;
    }

    #analysis-output {
      margin: 0;
      padding: 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.25);
      font-family: Consolas, Monaco, monospace;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>VizuPlayer Audio Analysis MVP</h1>
    <p>Choose a local audio file, then press Play. Analysis values are logged to the browser console.</p>

    <input id="audio-file-input" type="file" accept="audio/*" />

    <div class="row">
      <button id="play-button" disabled>Play</button>
      <button id="pause-button" disabled>Pause</button>
    </div>

    <p id="player-status">Status: waiting for file</p>
    <pre id="analysis-output">{ "bass": 0, "mid": 0, "treble": 0, "amplitude": 0 }</pre>
  </main>

  <script type="module" src="./src/core/app.js"></script>
</body>
</html>
